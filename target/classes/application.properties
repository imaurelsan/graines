# ==============================
# Configuration base H2 en mémoire
# ==============================
spring.datasource.url=jdbc:h2:mem:graines
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==============================
# Configuration JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Pourquoi create-drop ? Parce qu'avec une base H2 en mémoire, on recrée le schéma à chaque démarrage — parfait pour le développement et les tests.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# Console H2 (accès via navigateur)
# ==============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
